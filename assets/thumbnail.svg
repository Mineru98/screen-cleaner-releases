<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#1C2333"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A84FF"/>
      <stop offset="100%" style="stop-color:#0055D4"/>
    </linearGradient>
    <linearGradient id="screenDirty" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="100%" style="stop-color:#1A1A1A"/>
    </linearGradient>
    <linearGradient id="screenClean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD"/>
      <stop offset="100%" style="stop-color:#D0EAFF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="dirtyBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Blue accent glow blob (left) -->
  <ellipse cx="250" cy="315" rx="220" ry="180" fill="#0A84FF" opacity="0.06"/>
  <!-- Blue accent glow blob (right) -->
  <ellipse cx="950" cy="315" rx="220" ry="180" fill="#0A84FF" opacity="0.06"/>

  <!-- ===== LEFT MACBOOK (DIRTY) ===== -->
  <g transform="translate(90, 120)" filter="url(#softShadow)">
    <!-- Laptop lid -->
    <rect x="0" y="0" width="340" height="215" rx="14" fill="#2C2C2E"/>
    <rect x="8" y="8" width="324" height="199" rx="9" fill="url(#screenDirty)"/>

    <!-- Dirty screen fingerprints & smudges -->
    <g opacity="0.55" filter="url(#dirtyBlur)">
      <ellipse cx="120" cy="80" rx="32" ry="14" fill="#5A4A3A" transform="rotate(-20,120,80)"/>
      <ellipse cx="210" cy="130" rx="28" ry="11" fill="#4A3A2A" transform="rotate(15,210,130)"/>
      <ellipse cx="80" cy="150" rx="20" ry="9" fill="#503C2C" transform="rotate(-35,80,150)"/>
      <ellipse cx="270" cy="60" rx="24" ry="10" fill="#4E3E2E" transform="rotate(25,270,60)"/>
      <ellipse cx="160" cy="170" rx="35" ry="13" fill="#5C4C3C" transform="rotate(10,160,170)"/>
      <ellipse cx="300" cy="140" rx="18" ry="8" fill="#483828" transform="rotate(-15,300,140)"/>
      <ellipse cx="50" cy="70" rx="16" ry="7" fill="#4A3A2A" transform="rotate(40,50,70)"/>
    </g>
    <!-- Finger smudge circles (more realistic) -->
    <g opacity="0.3">
      <circle cx="140" cy="100" r="18" fill="#7A6050" filter="url(#dirtyBlur)"/>
      <circle cx="230" cy="155" r="14" fill="#6A5040" filter="url(#dirtyBlur)"/>
      <circle cx="95" cy="160" r="12" fill="#7A6050" filter="url(#dirtyBlur)"/>
      <circle cx="260" cy="90" r="16" fill="#6A5040" filter="url(#dirtyBlur)"/>
    </g>
    <!-- Dust specks -->
    <g fill="#8A7060" opacity="0.6">
      <circle cx="55" cy="45" r="2"/>
      <circle cx="180" cy="35" r="1.5"/>
      <circle cx="310" cy="170" r="2"/>
      <circle cx="70" cy="185" r="1.5"/>
      <circle cx="295" cy="30" r="2"/>
      <circle cx="150" cy="195" r="1"/>
      <circle cx="240" cy="45" r="1.5"/>
    </g>

    <!-- Laptop base -->
    <rect x="-12" y="215" width="364" height="18" rx="4" fill="#3A3A3C"/>
    <rect x="130" y="218" width="80" height="6" rx="3" fill="#2C2C2E"/>

    <!-- DIRTY label -->
    <rect x="100" y="240" width="140" height="26" rx="13" fill="#FF3B30" opacity="0.15"/>
    <text x="170" y="258" text-anchor="middle" fill="#FF6B60" font-size="12" font-weight="600" letter-spacing="1">BEFORE</text>
  </g>

  <!-- ===== ARROW IN THE MIDDLE ===== -->
  <g transform="translate(520, 285)">
    <!-- Arrow shaft -->
    <line x1="0" y1="30" x2="120" y2="30" stroke="#0A84FF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Arrowhead -->
    <polygon points="108,20 130,30 108,40" fill="#0A84FF" opacity="0.9"/>
    <!-- Sparkle dots along arrow -->
    <circle cx="30" cy="30" r="3" fill="#0A84FF" opacity="0.6"/>
    <circle cx="60" cy="30" r="3" fill="#0A84FF" opacity="0.7"/>
    <circle cx="90" cy="30" r="3" fill="#0A84FF" opacity="0.8"/>
  </g>

  <!-- ===== RIGHT MACBOOK (CLEAN) ===== -->
  <g transform="translate(770, 120)" filter="url(#softShadow)">
    <!-- Laptop lid -->
    <rect x="0" y="0" width="340" height="215" rx="14" fill="#2C2C2E"/>
    <rect x="8" y="8" width="324" height="199" rx="9" fill="url(#screenClean)"/>

    <!-- Clean screen content -->
    <rect x="20" y="20" width="280" height="170" rx="7" fill="#FFFFFF" opacity="0.5"/>
    <!-- Sparkles on clean screen -->
    <g filter="url(#glow)">
      <path d="M 100 80 L 105 95 L 120 100 L 105 105 L 100 120 L 95 105 L 80 100 L 95 95 Z" fill="#FFD700" opacity="0.9"/>
      <path d="M 230 60 L 234 71 L 246 75 L 234 79 L 230 90 L 226 79 L 214 75 L 226 71 Z" fill="#FFD700" opacity="0.85"/>
      <path d="M 180 150 L 183 158 L 191 161 L 183 164 L 180 172 L 177 164 L 169 161 L 177 158 Z" fill="#FFC700" opacity="0.8"/>
    </g>
    <!-- Shine streaks -->
    <line x1="30" y1="30" x2="80" y2="50" stroke="#FFFFFF" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <line x1="50" y1="25" x2="70" y2="40" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

    <!-- Laptop base -->
    <rect x="-12" y="215" width="364" height="18" rx="4" fill="#3A3A3C"/>
    <rect x="130" y="218" width="80" height="6" rx="3" fill="#2C2C2E"/>

    <!-- CLEAN label -->
    <rect x="100" y="240" width="140" height="26" rx="13" fill="#30D158" opacity="0.15"/>
    <text x="170" y="258" text-anchor="middle" fill="#30D158" font-size="12" font-weight="600" letter-spacing="1">AFTER</text>
  </g>

  <!-- ===== APP ICON + NAME (centered group, side by side) ===== -->
  <!-- Icon at x=412, Text starts at x=498 — total ~376px, centered around x=600 -->
  <g transform="translate(412, 22)">
    <!-- Icon background -->
    <rect x="0" y="0" width="70" height="70" rx="16" fill="url(#blueGrad)" filter="url(#glow)"/>
    <!-- Monitor -->
    <rect x="12" y="10" width="46" height="35" rx="5" fill="white" opacity="0.95"/>
    <rect x="16" y="14" width="38" height="27" rx="3" fill="#F0F0F5"/>
    <!-- Sparkle on icon -->
    <path d="M 35 22 L 37 27 L 43 29 L 37 31 L 35 36 L 33 31 L 27 29 L 33 27 Z" fill="#FFD700"/>
    <!-- Monitor stand -->
    <path d="M 26 45 L 30 51 L 40 51 L 44 45 Z" fill="white" opacity="0.9"/>
    <rect x="32" y="51" width="6" height="5" rx="1" fill="white" opacity="0.9"/>
  </g>
  <!-- App name to the right of icon -->
  <text x="498" y="67" text-anchor="start" fill="#FFFFFF" font-size="42" font-weight="700" letter-spacing="-1" opacity="0.95">ScreenCleaner</text>
  <text x="500" y="90" text-anchor="start" fill="#8B9BB4" font-size="15" letter-spacing="0.5">for macOS</text>

  <!-- ===== BOTTOM TAGLINE ===== -->
  <text x="600" y="430" text-anchor="middle" fill="#FFFFFF" font-size="26" font-weight="600" opacity="0.9">Lock your keyboard. Clean your screen.</text>
  <text x="600" y="466" text-anchor="middle" fill="#8B9BB4" font-size="15" letter-spacing="0.3">A tiny macOS app that blocks keyboard input while you wipe down your MacBook.</text>

  <!-- ===== FEATURE PILLS (BOTTOM) ===== -->
  <g transform="translate(600, 510)" text-anchor="middle">
    <!-- Pill 1 -->
    <rect x="-310" y="0" width="180" height="34" rx="17" fill="#0A84FF" opacity="0.15"/>
    <rect x="-310" y="0" width="180" height="34" rx="17" fill="none" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <text x="-220" y="22" text-anchor="middle" fill="#5AB4FF" font-size="13" font-weight="500">⌨️  Keyboard Lock</text>

    <!-- Pill 2 -->
    <rect x="-85" y="0" width="170" height="34" rx="17" fill="#0A84FF" opacity="0.15"/>
    <rect x="-85" y="0" width="170" height="34" rx="17" fill="none" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <text x="0" y="22" text-anchor="middle" fill="#5AB4FF" font-size="13" font-weight="500">🌑  Screen Dim</text>

    <!-- Pill 3 -->
    <rect x="110" y="0" width="200" height="34" rx="17" fill="#0A84FF" opacity="0.15"/>
    <rect x="110" y="0" width="200" height="34" rx="17" fill="none" stroke="#0A84FF" stroke-width="1" opacity="0.4"/>
    <text x="210" y="22" text-anchor="middle" fill="#5AB4FF" font-size="13" font-weight="500">⏱  Timer Presets</text>
  </g>

  <!-- ===== BREW BADGE (TOP RIGHT) ===== -->
  <g transform="translate(980, 28)">
    <rect x="0" y="0" width="180" height="34" rx="8" fill="#FF6B2B" opacity="0.15"/>
    <rect x="0" y="0" width="180" height="34" rx="8" fill="none" stroke="#FF6B2B" stroke-width="1" opacity="0.5"/>
    <text x="90" y="22" text-anchor="middle" fill="#FF8C55" font-size="13" font-weight="600">🍺  brew install</text>
  </g>
</svg>
